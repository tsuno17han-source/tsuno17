<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>つの17班 ホームページ</title>
    <style>
        /* ページ全体のスタイル */
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            line-height: 1.6;
            color: #333;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
        }

        /* ヘッダー */
        header {
            background-color: #2c3e50;
            color: #fff;
            padding: 2rem 1rem;
            text-align: center;
        }

        /* メインコンテンツの枠組み */
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border-radius: 8px;
        }

        /* 見出しの装飾 */
        h1 { margin: 0; font-size: 1.8rem; }
        h2 {
            color: #2c3e50;
            border-left: 5px solid #27ae60;
            padding-left: 15px;
            margin-top: 30px;
        }

        /* 文章のスタイル */
        p { margin-bottom: 1.5rem; }

        /* フッター */
        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.8rem;
            color: #777;
        }
    </style>
</head>
<body>

    <header>
        <h1>つの17班 ホームページ</h1>
    </header>

    <div class="container">
        <section>
            <h2>お知らせ</h2>
            <p>
                ここは「つの17班」のホームページです。<br>
                私たちの活動内容や、最新の情報をここで公開していきます。
            </p>
        </section>

        <section>
            <h2>班の紹介</h2>
            <p>
                つの17班では、地域に根ざした活動を大切にしています。<br>
                メンバー一人ひとりが協力し合い、より良いコミュニティづくりを目指しています。
            </p>
        </section>
    </div>

    <footer>
        &copy; 2026 つの17班 All Rights Reserved.
    </footer>

</body>
</html>
